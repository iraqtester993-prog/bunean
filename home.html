<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>html,body{background:#0b1a2e!important}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b1a2e">
    <title>بنيان - الرئيسية</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <script>if ('scrollRestoration' in history) history.scrollRestoration = 'manual';</script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/header.js"></script>
    <script src="js/bottom-nav.js"></script>
    <script src="js/router.js"></script>
    <script src="js/project-modal.js"></script>
    <style>.hide-scroll::-webkit-scrollbar{display:none}.hide-scroll{scrollbar-width:none;-ms-overflow-style:none}.page-content::-webkit-scrollbar{display:none}.page-content{scrollbar-width:none;-ms-overflow-style:none}
.partners-track-wrapper{overflow:hidden;padding:0 14px 12px;position:relative;}.partners-track{display:flex;gap:12px;width:fit-content;}.partner-item{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;width:90px;cursor:pointer;transition:transform 0.2s;}.partner-item:active{transform:scale(0.92);}.partner-icon{width:64px;height:64px;border-radius:50%;overflow:hidden;background:var(--bg-card-light);border:2px solid var(--border-input);display:flex;align-items:center;justify-content:center;transition:all 0.3s;}.partner-icon img{width:100%;height:100%;object-fit:cover;display:block;border-radius:50%;filter:grayscale(40%);transition:filter 0.3s;}.partner-item:active .partner-icon img{filter:grayscale(0%);}.partner-item:active .partner-icon{border-color:var(--accent-gold);}.partner-name{font-size:10px;font-weight:600;color:var(--text-light);text-align:center;line-height:1.2;white-space:nowrap;}</style>
    <link rel="prefetch" href="account.html">
    <link rel="prefetch" href="execute.html">
    <link rel="prefetch" href="market.html">
    <link rel="prefetch" href="ideas.html">
    <script>
        (function() {
            var saved = localStorage.getItem('bunean-theme');
            var prefers = window.matchMedia('(prefers-color-scheme: light)').matches;
            if (saved === 'light' || (!saved && prefers)) {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>
</head>
<body>
    <div id="header"></div>
    <div id="app" v-cloak>
        <div class="app-container">

            <div class="page-content" v-if="!selectedProject">
                <!-- Hero Slider -->
                <div class="hero-slider"
                     @touchstart.passive="heroSwipe.onTouchStart"
                     @touchend="heroSwipe.onTouchEnd">
                    <div class="slider-track" dir="ltr" :style="{ transform: `translateX(-${currentSlide * 100}%)` }">
                        <div v-for="(slide, i) in slides" :key="i" class="slider-slide">
                            <div class="slide-img-wrap">
                                <img :src="slide.bg" class="slide-img" alt="">
                                <div class="slide-overlay"></div>
                                <div class="slide-content" dir="rtl">
                                    <h2>{{ slide.title }}</h2>
                                    <p>{{ slide.desc }}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="slider-dots">
                        <span v-for="(s, i) in slides" :key="i"
                              class="dot" :class="{ active: i === currentSlide }"
                              @click="currentSlide = i"></span>
                    </div>
                </div>

                <!-- Home Sections -->
                <div class="home-sections">
<a v-for="(sec, i) in sections" :key="i" :href="sec.link"
                     class="home-section-item"
                     @click.prevent="requireAccount(function() { goTo(sec.link); })">
                        <div class="home-section-icon">
                            <span class="material-symbols-outlined">{{ sec.icon }}</span>
                            <span class="home-section-name" v-html="sec.name"></span>
                        </div>
                    </a>
                </div>

                <!-- Ads -->
                <div class="section-header">
                    <span class="section-title">إعلانات ممولة</span>
                </div>
                <div class="ad-slider"
                     @touchstart.passive="adSwipe.onTouchStart"
                     @touchend="adSwipe.onTouchEnd">
                    <div class="ad-slider-track" dir="ltr" :style="{ transform: `translateX(-${adSlide * 100}%)` }">
                        <div v-for="(ad, i) in ads" :key="i" class="ad-slider-slide" :class="'ad-type-' + (ad.type === 'عرض خاص' ? 'offer' : ad.type === 'تخفيض' ? 'discount' : 'project')" @click="requireAccount(function() { openProject(ad); })">
                            <div class="ad-slider-img">
                                <img :src="ad.bg" alt="">
                                <span class="ad-type-badge" :class="'badge-' + (ad.type === 'عرض خاص' ? 'offer' : ad.type === 'تخفيض' ? 'discount' : 'project')">{{ ad.type }}</span>
                            </div>
                            <div class="ad-slider-info">
                                <div class="ad-title">{{ ad.title }}</div>
                                <div class="ad-company">{{ ad.company }}</div>
                            </div>
                        </div>
                    </div>
                    <div v-if="ads.length > 1" class="ad-slider-dots">
                        <span v-for="(ad, i) in ads" :key="i" class="dot" :class="{ active: i === adSlide }" @click="adSlide = i; resetAdTimer()"></span>
                    </div>
                </div>

                <!-- Latest Works -->
                <div class="section-header">
                    <span class="section-title">آخر الأعمال</span>
                </div>
                <div class="works-carousel">
                    <div v-for="(work, i) in latestWorks" :key="i"
                         class="work-card" @click="requireAccount(function() { openProject(work); })">
                        <div class="work-card-img">
                            <img :src="work.bg" alt="">
                            <span class="work-type-badge badge-project">{{ work.type }}</span>
                        </div>
                        <div class="work-card-info">
                            <div class="work-card-company">{{ work.company }}</div>
                            <div class="work-card-title">{{ work.title }}</div>
                        </div>
                    </div>
                </div>

                <!-- سلايدر صور -->
                <div class="gallery-slider gallery-slider-spaced"
                     @touchstart.passive="gallerySwipe.onTouchStart"
                     @touchend="gallerySwipe.onTouchEnd">
                    <div class="gallery-track" dir="ltr" :style="{ transform: `translateX(-${gallerySlide * 100}%)` }">
                        <div v-for="(img, i) in galleryImages" :key="i" class="gallery-slide">
                            <img :src="img" alt="">
                        </div>
                    </div>
                    <div v-if="galleryImages.length > 1" class="gallery-dots">
                        <span v-for="(img, i) in galleryImages" :key="i"
                              class="dot" :class="{ active: i === gallerySlide }"
                              @click="gallerySlide = i"></span>
                    </div>
                </div>

                <!-- شركائنا -->
                <div class="section-header">
                    <span class="section-title">شركائنا</span>
                </div>
                <div class="partners-track-wrapper hide-scroll" style="overflow-x:auto;cursor:grab;">
                    <div class="partners-track">
                        <div v-for="(partner, i) in partners" :key="i" class="partner-item">
                            <div class="partner-icon">
                                <img :src="partner.logo" :alt="partner.name">
                            </div>
                            <span class="partner-name">{{ partner.name }}</span>
                        </div>
                        <div v-for="(partner, i) in partners" :key="'dup-'+i" class="partner-item">
                            <div class="partner-icon">
                                <img :src="partner.logo" :alt="partner.name">
                            </div>
                            <span class="partner-name">{{ partner.name }}</span>
                        </div>
                    </div>
                </div>

                <!-- padding -->
                <div style="height: 20px;"></div>

            </div>

            <!-- صفحة تفاصيل المشروع (شاشة كاملة مع الهدر والنايف) -->
            <project-detail v-if="selectedProject && !projectDetail"
                :project="selectedProject"
                :company-name="selectedProject.company"
                :company-link="selectedProject.companyLink"
                :company-verified="selectedProject.companyVerified"
                :slide-index="modalSlide"
                @close="selectedProject = null"
                @open-viewer="openViewer"
                @slide-change="(v) => modalSlide = v"
            />

            <!-- Full-Screen Image Viewer -->
            <div v-if="viewerOpen" class="image-viewer"
                 @touchstart.passive="viewerTouch.onTouchStart"
                 @touchmove.passive="viewerTouch.onTouchMove"
                 @touchend="viewerTouch.onTouchEnd($event, closeViewer)">
                <button class="viewer-close" @click="closeViewer">
                    <span class="material-symbols-outlined">close</span>
                </button>
                <button v-if="viewerImages.length > 1" class="viewer-nav viewer-prev" @click="prevViewer">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
                <div class="viewer-image-wrap" @click="closeViewer">
                    <img :src="viewerImages[viewerIndex]" class="viewer-image" alt="صورة المشروع"
                         :style="{ transform: 'scale(' + viewerScale + ') translate(' + viewerPanX/viewerScale + 'px, ' + viewerPanY/viewerScale + 'px)' }">
                </div>
                <button v-if="viewerImages.length > 1" class="viewer-nav viewer-next" @click="nextViewer">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <div v-if="viewerImages.length > 1" class="viewer-counter">{{ viewerIndex + 1 }} / {{ viewerImages.length }}</div>
            </div>

        </div>
    </div>

    <div id="bottomNav"></div>

    <script src="js/project-data.js"></script>
    <script src="js/project-detail.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/back-nav.js"></script>
    <script src="js/pull-to-refresh.js"></script>
    <script src="js/global-viewer.js"></script>
    <script src="js/page-home.js"></script>
    
    
    <script src="js/page-loader.js"></script>
</body>
</html>
