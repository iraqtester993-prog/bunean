<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f1419">
    <title>بنيان - لوحة التحكم</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <div class="logo">ب</div>
                <span class="brand-text">بنيان</span>
            </div>
            <button class="sidebar-toggle toggle-sidebar" title="تصغير/تكبير">◀</button>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
    </aside>

    <!-- Main -->
    <div class="main">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="topbar-btn-toggle toggle-mobile">☰</button>
                <div class="topbar-title">
                    <h2 id="pageTitle"></h2>
                    <span class="breadcrumb" id="breadcrumb"></span>
                </div>
            </div>
            <div class="topbar-right">
                <button class="topbar-btn toggle-theme" title="تبديل المود">☀️</button>
                <button class="topbar-btn" title="عودة للتطبيق" onclick="window.open('..','_blank')">🏠</button>
                <button class="topbar-btn" title="تحديث" onclick="dashboard.init()">🔄</button>
            </div>
        </header>

        <!-- Content -->
        <div class="content" id="pageContent"></div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
