<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b1a2e">
    <title>بنيان - طلب عرض سعر</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function() {
            var saved = localStorage.getItem('bunean-theme');
            var prefers = window.matchMedia('(prefers-color-scheme: light)').matches;
            if (saved === 'light' || (!saved && prefers)) {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>
    <script>if ('scrollRestoration' in history) history.scrollRestoration = 'manual';</script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/header.js"></script>
    <script src="js/bottom-nav.js"></script>
</head>
<body>
    <div id="app" v-cloak>
        <div class="app-container">
            <div id="header"></div>

            <div class="page-content">
                <div style="padding:0 16px 24px;">
                    <div class="mkt-checkout-form" style="background:var(--bg-card);border-radius:14px;padding:16px;border:1px solid var(--border-light);">
                        <div style="color:var(--text-white);font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;">
                            <span class="material-symbols-outlined" style="font-size:20px;color:var(--accent-gold);">request_quote</span>
                            طلب عرض سعر جديد
                            <span v-if="targetCompany" style="color:var(--accent-gold);font-size:12px;font-weight:500;">لـ {{ targetCompany }}</span>
                        </div>
                        <div class="mkt-form-group">
                            <label style="color:var(--text-white);font-size:12px;font-weight:600;display:block;margin-bottom:4px;"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;">person</span> الاسم</label>
                            <input type="text" class="form-input" v-model="newQR.name" placeholder="الاسم" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--border-light);background:var(--bg-input);color:var(--text-white);font-size:13px;">
                        </div>
                        <div class="mkt-form-group">
                            <label style="color:var(--text-white);font-size:12px;font-weight:600;display:block;margin-bottom:4px;"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;">call</span> الهاتف</label>
                            <input type="tel" class="form-input" v-model="newQR.phone" placeholder="رقم الهاتف" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--border-light);background:var(--bg-input);color:var(--text-white);font-size:13px;">
                        </div>
                        <div class="mkt-form-group">
                            <label style="color:var(--text-white);font-size:12px;font-weight:600;display:block;margin-bottom:4px;"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;">location_on</span> الموقع</label>
                            <input type="text" class="form-input" v-model="newQR.location" placeholder="الموقع" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--border-light);background:var(--bg-input);color:var(--text-white);font-size:13px;">
                        </div>
                        <div class="mkt-form-group">
                            <label style="color:var(--text-white);font-size:12px;font-weight:600;display:block;margin-bottom:4px;"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;">square_foot</span> المساحة <span style="color:var(--text-muted);font-size:10px;">(اختياري)</span></label>
                            <input type="text" class="form-input" v-model="newQR.size" placeholder="مثال: 150 م²" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--border-light);background:var(--bg-input);color:var(--text-white);font-size:13px;">
                        </div>
                        <div class="mkt-form-group">
                            <label style="color:var(--text-white);font-size:12px;font-weight:600;display:block;margin-bottom:4px;"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;">account_balance</span> الميزانية <span style="color:var(--text-muted);font-size:10px;">(اختياري)</span></label>
                            <input type="text" class="form-input" v-model="newQR.budget" placeholder="مثال: 50,000,000 د.ع" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--border-light);background:var(--bg-input);color:var(--text-white);font-size:13px;">
                        </div>
                        <div class="mkt-form-group">
                            <label style="color:var(--text-white);font-size:12px;font-weight:600;display:block;margin-bottom:4px;"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;">category</span> التصنيف</label>
                            <select class="form-input" v-model="newQR.category" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--border-light);background:var(--bg-input);color:var(--text-white);font-size:13px;">
                                <option value="">اختر التصنيف</option>
                                <option v-for="c in categories" :key="c" :value="c">{{ c }}</option>
                            </select>
                        </div>
                        <div class="mkt-form-group">
                            <label style="color:var(--text-white);font-size:12px;font-weight:600;display:block;margin-bottom:4px;"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;">description</span> التفاصيل</label>
                            <textarea class="form-input" v-model="newQR.details" placeholder="وصف المشروع والمواصفات المطلوبة..." style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--border-light);background:var(--bg-input);color:var(--text-white);font-size:13px;min-height:80px;font-family:Cairo,sans-serif;"></textarea>
                        </div>
                        <div class="mkt-form-group">
                            <label style="color:var(--text-white);font-size:12px;font-weight:600;display:block;margin-bottom:4px;"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;">image</span> صور المشروع <span style="color:var(--text-muted);font-size:10px;">(اختياري)</span></label>
                            <div style="display:flex;flex-wrap:wrap;gap:8px;">
                                <div v-for="(img, idx) in newQR.images" :key="idx" style="width:72px;height:72px;border-radius:10px;overflow:hidden;position:relative;border:1px solid var(--border-light);">
                                    <img :src="img" style="width:100%;height:100%;object-fit:cover;">
                                    <button type="button" @click="newQR.images.splice(idx,1)" style="position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;border:none;background:rgba(0,0,0,0.6);color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-family:Cairo,sans-serif;">
                                        <span class="material-symbols-outlined" style="font-size:12px;">close</span>
                                    </button>
                                </div>
                                <label v-if="newQR.images.length < 5" style="width:72px;height:72px;border-radius:10px;border:1px dashed var(--border-light);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);font-size:10px;gap:2px;">
                                    <span class="material-symbols-outlined" style="font-size:20px;">add_photo_alternate</span>
                                    إضافة
                                    <input type="file" accept="image/*" style="display:none;" @change="addQuoteImage">
                                </label>
                            </div>
                        </div>
                        <button @click="submitNewQuoteRequest" style="width:100%;padding:12px;border:none;border-radius:12px;background:var(--accent-gold);color:var(--primary-dark);font-size:14px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif;">
                            <span class="material-symbols-outlined" style="font-size:18px;vertical-align:middle;">send</span> إرسال طلب عرض السعر
                        </button>
                    </div>
                </div>
            </div>

            <div id="bottomNav"></div>
        </div>

        <!-- Success Popup -->
        <div v-if="showSuccess" class="success-overlay" @click="showSuccess = false">
            <div class="success-modal" @click.stop>
                <div class="success-icon-wrap">
                    <span class="material-symbols-outlined success-icon">check_circle</span>
                </div>
                <h2 class="success-title">تم الإرسال بنجاح</h2>
                <p class="success-desc">تم إرسال طلب عرض السعر<br>سيتم الرد عليك من قبل الشركة</p>
                <button class="success-btn" @click="showSuccess = false">حسناً</button>
            </div>
        </div>
    </div>

    <script src="js/nav.js"></script>
    <script src="js/global-viewer.js"></script>
    <script>
        initTheme();
        document.getElementById('header').innerHTML = renderHeader({});
        document.getElementById('bottomNav').innerHTML = renderNav('home');

        const { createApp, ref } = Vue;

        createApp({
            setup() {
                initTheme();
                var urlParams = new URLSearchParams(window.location.search);
                var targetCompany = ref(urlParams.get('company') || '');
                var targetProject = ref(urlParams.get('project') || '');
                var targetType = ref(urlParams.get('type') || '');

                var showSuccess = ref(false);

                var categories = ['بناء سكني', 'بناء تجاري', 'تشطيبات', 'خرسانة', 'أعمال صحية', 'أعمال كهربائية', 'دهانات', 'أرضيات', 'واجهات', 'حدائق', 'أخرى'];

                var newQR = ref({ company: targetCompany.value, name: '', phone: '', location: '', size: '', budget: '', category: targetType.value, details: targetProject.value ? ('الاستفسار عن مشروع: ' + targetProject.value) : '', images: [] });
                function addQuoteImage(e) {
                    var file = e.target.files[0];
                    if (!file) return;
                    if (newQR.value.images.length >= 5) { showBrandAlert('الحد الأقصى 5 صور'); e.target.value = ''; return; }
                    var reader = new FileReader();
                    reader.onload = function(ev) { newQR.value.images.push(ev.target.result); };
                    reader.readAsDataURL(file);
                    e.target.value = '';
                }
                function submitNewQuoteRequest() {
                    requireAccount(function() {
                    if (!newQR.value.name.trim()) { showBrandAlert('أدخل الاسم'); return; }
                    if (!newQR.value.phone.trim()) { showBrandAlert('أدخل رقم الهاتف'); return; }
                    if (!newQR.value.location.trim()) { showBrandAlert('أدخل الموقع'); return; }
                    if (!newQR.value.category) { showBrandAlert('اختر التصنيف'); return; }
                    if (!newQR.value.details.trim()) { showBrandAlert('أدخل تفاصيل المشروع'); return; }
                    var reqs = JSON.parse(localStorage.getItem('bunean-quote-requests') || '[]');
                    reqs.push({
                        id: Date.now(),
                        company: newQR.value.company,
                        name: newQR.value.name.trim(),
                        phone: newQR.value.phone.trim(),
                        location: newQR.value.location.trim(),
                        size: newQR.value.size.trim(),
                        budget: newQR.value.budget.trim(),
                        category: newQR.value.category,
                        details: newQR.value.details.trim(),
                        images: newQR.value.images,
                        replied: false,
                        replyMessage: '',
                        createdAt: new Date().toISOString()
                    });
                    localStorage.setItem('bunean-quote-requests', JSON.stringify(reqs));
                    newQR.value = { company: targetCompany.value, name: '', phone: '', location: '', size: '', budget: '', category: '', details: '', images: [] };
                    showSuccess.value = true;
                    });
                }

                return {
                    showSuccess,
                    categories,
                    targetCompany, targetProject, targetType,
                    newQR, submitNewQuoteRequest, addQuoteImage
                };
            }
        }).mount('#app');

        initFloatingCart();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(function() { console.log('SW registered'); })
                .catch(function(err) { console.log('SW registration failed'); });
        }
    </script>
</body>
</html>
