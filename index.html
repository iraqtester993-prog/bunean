    <style>
        .app-loading #app { display: none !important; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: 'Cairo', sans-serif;
            background: #1a3a5c;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            width: 100%;
            height: 100%;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
        }

        body {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            overflow-x: hidden;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        #app {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
            max-width: 430px;
            margin: 0 auto;
            background: linear-gradient(180deg, #1a3a5c 0%, #1e4068 30%, #1a3a5c 100%);
            overflow: hidden;
        }


        /* Main Content */
        .main-content {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 55px 24px 0;
            position: relative;
            z-index: 2;
            overflow-y: auto;
            overflow-x: hidden;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .main-content::-webkit-scrollbar {
            display: none;
        }

        /* Logo Section */
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            margin-top: -40px;
            flex-shrink: 0;
        }

        /* ===== قسم الشعار ===== */
        .logo-icon {
            width: 180px;
            height: 180px;
            margin-bottom: 0;
            border: none;
            outline: none;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ===== نص الشعار ===== */
        .logo-text {
            font-size: 38px;
            font-weight: 800;
            color: #ffffff; /* لون أبيض */
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        /* ===== الشعار الفرعي ===== */
        .logo-subtitle {
            font-size: 13px;
            color: #ffffff;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }
        .gold-line {
            color: #c9a243;
        }

        /* ===== حاوية تسجيل الدخول ===== */
        .login-card {
            width: 100%;
            background: rgba(20, 45, 75, 0.6);
            border-radius: 20px;
            padding: 22px 18px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            flex-shrink: 0;
        }

        /* ===== حقول الإدخال ===== */
        .input-group {
            position: relative;
            margin-bottom: 12px;
        }

        .input-field {
            width: 100%;
            padding: 14px 46px 14px 46px;
            background: rgba(15, 30, 50, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            direction: rtl;
        }

        .input-field::placeholder {
            color: #b0c4d9;
            font-weight: 400;
            font-size: 14px;
        }

        .input-field:focus {
            outline: none;
            border-color: rgba(201, 162, 67, 0.4);
        }

        .input-icon-right {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            color: #c9a243;
        }

        .input-icon-left {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #ffffff;
            cursor: pointer;
        }

        .input-icon-left:hover {
            color: #c9a243;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 14px;
        }

        .forgot-password a {
            color: #ffffff;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
        }

        .forgot-password a:hover {
            color: #c9a243;
        }

        /* ===== زر الدخول ===== */
        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #d4aa4a 0%, #c9993a 100%);
            border: none;
            border-radius: 12px;
            color: #0a1628;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(201, 162, 67, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        /* ===== زر المتابعة كضيف ===== */
        .guest-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0 0;
            width: 100%;
            padding: 12px 0;
            border: 1.5px solid rgba(201, 162, 67, 0.35);
            border-radius: 10px;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .guest-btn:hover {
            background: rgba(201, 162, 67, 0.08);
            border-color: #c9a243;
        }

        .guest-btn:active {
            transform: scale(0.97);
        }

        .guest-btn-text {
            color: #c9a243;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: color 0.3s ease;
        }

        .guest-btn-icon {
            font-size: 18px;
            margin-left: 6px;
            color: #c9a243;
        }

        .guest-btn:hover .guest-btn-text,
        .guest-btn:hover .guest-btn-icon {
            color: #d4b454;
        }

        /* خطوط جانبية للفصل */
        .guest-divider {
            display: flex;
            align-items: center;
            margin: 18px 0 0;
            gap: 12px;
        }

        .guest-divider-line {
            flex: 1;
            height: 1px;
            background: rgba(201, 162, 67, 0.2);
        }

        /* ===== حاوية التسجيل - ليس لديك حساب ===== */
        .register-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 14px;
            padding: 14px 18px;
            background: rgba(20, 45, 75, 0.6);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            flex-shrink: 0;
        }

        /* Registration buttons in separate card */
        .reg-buttons-row {
            width: 100%;
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding: 14px 18px;
            background: rgba(20, 45, 75, 0.6);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            flex-shrink: 0;
            box-sizing: border-box;
        }
        .reg-buttons-row .register-btn {
            flex: 1;
            padding: 12px 6px;
            font-size: 12px;
            white-space: nowrap;
        }

        /* Registration form elements */
        .register-section .reg-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }
        .register-section .reg-back {
            font-size: 22px;
            color: #c9a243;
            cursor: pointer;
        }

        .register-section .reg-input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(15, 30, 50, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Cairo', sans-serif;
            direction: rtl;
            box-sizing: border-box;
        }
        .register-section .reg-input::placeholder { color: #b0c4d9; }
        .register-section .reg-input:focus { outline: none; border-color: rgba(201, 162, 67, 0.4); }
        .register-section select.reg-input {
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
        }
        .register-section select.reg-input option { background: #1a3a5c; color: #fff; }

        .register-section .reg-pwd-wrap {
            position: relative;
            width: 100%;
        }
        .register-section .reg-pwd-wrap .reg-input { padding-left: 44px; }
        .register-section .reg-pwd-toggle {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            cursor: pointer;
        }
        .register-section .reg-pwd-toggle .material-symbols-outlined { font-size: 20px; }

        .register-section .reg-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #d4aa4a 0%, #c9993a 100%);
            border: none;
            border-radius: 12px;
            color: #0a1628;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
        }

        .register-section .reg-otp-icon { text-align: center; margin-bottom: 4px; }
        .register-section .reg-otp-title { text-align: center; font-size: 16px; font-weight: 700; color: #fff; }
        .register-section .reg-otp-desc { text-align: center; font-size: 13px; color: #b0c4d9; margin-bottom: 4px; }
        .register-section .reg-otp-input { text-align: center; font-size: 24px; letter-spacing: 8px; font-weight: 700; }
        .register-section .reg-back-link { text-align: center; font-size: 12px; color: #b0c4d9; cursor: pointer; }

.register-btn {
            flex: 1;
            padding: 10px 12px;
            background: linear-gradient(135deg, #d4aa4a 0%, #c9993a 100%);
            border: none;
            border-radius: 10px;
            color: #0a1628;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .register-btn.register-btn-company {
            background: transparent;
            border: 1px solid #c9a243;
            color: #c9a243;
        }

        .register-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(201, 162, 67, 0.3);
        }



        /* ===== مشهد البناء السفلي ===== */
        .bottom-scene {
            position: relative;
            width: 100%;
            height: 180px;
            margin-top: 14px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .bottom-scene-image {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: bottom center;
        }

        .bottom-scene::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30%;
            background: linear-gradient(180deg, #1a3a5c 0%, transparent 100%);
            z-index: 2;
        }

        .bottom-scene::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 10%;
            background: linear-gradient(0deg, #1a3a5c 0%, transparent 100%);
            z-index: 2;
        }

        /* Error/Success */
        .error-msg {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.2);
            color: #ff6b6b;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 12px;
            text-align: center;
        }

        .success-msg {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.2);
            color: #51cf66;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 12px;
            text-align: center;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in { animation: fadeInUp 0.4s ease forwards; }
        .animate-delay-1 { animation-delay: 0.1s; opacity: 0; }
        .animate-delay-2 { animation-delay: 0.15s; opacity: 0; }
        .animate-delay-3 { animation-delay: 0.2s; opacity: 0; }
        .animate-delay-4 { animation-delay: 0.25s; opacity: 0; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading-dots { display: inline-flex; gap: 4px; }
        .loading-dots span {
            width: 5px; height: 5px;
            background: #0a1628;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        /* PWA Standalone */
        @media (display-mode: standalone) {
            .main-content {
                padding-top: calc(55px + env(safe-area-inset-top));
            }
        }

        @media (max-width: 380px) {
            .main-content { padding: 50px 18px 0; }
            .logo-text { font-size: 34px; }
            .login-card { padding: 20px 16px; }
        }

        @media (min-width: 768px) {
            .main-content { padding: 65px 32px 0; }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;

        }

        .modal-title {
            color: #c9a243;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 14px;
        }

        .modal-input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(15, 30, 50, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #ffffff;
            font-size: 14px;
            font-family: 'Cairo', sans-serif;
            direction: rtl;
            margin-bottom: 12px;
        }

        .modal-input:focus { outline: none; border-color: rgba(201, 162, 67, 0.4); }

        .modal-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #d4aa4a, #c9993a);
            border: none;
            border-radius: 10px;
            color: #0a1628;

            font-size: 13px;

        /* Splash Screen */
        .splash-screen {

                <div class="logo-text">بنيان</div>
                <div class="logo-subtitle"><span class="gold-line">—</span> نبني المستقبل <span class="gold-line">—</span></div>
            </div>

            <!-- Main Card: Login / Registration / OTP -->
            <div class="login-card animate-in animate-delay-2">

                <!-- ======= LOGIN VIEW ======= -->
                <template v-if="view === 'login'">
                    <div v-if="errorMsg" class="error-msg">{{ errorMsg }}</div>
                    <div v-if="successMsg" class="success-msg">{{ successMsg }}</div>

                    <div class="input-group">
                        <input type="text" class="input-field" placeholder="اسم المستخدم" v-model="username" @keyup.enter="focusPassword" ref="usernameInput">
                        <svg class="input-icon-right" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </div>
                    <div class="input-group">
                        <input :type="showPassword ? 'text' : 'password'" class="input-field" placeholder="كلمة المرور" v-model="password" @keyup.enter="handleLogin" ref="passwordInput">
                        <svg class="input-icon-right" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                        <div class="input-icon-left" @click="showPassword = !showPassword">
                            <svg v-if="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            <svg v-else width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </div>
                    </div>
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
                        <div class="forgot-password" style="margin-bottom:0;"><a href="#" @click.prevent="showForgotModal = true">هل نسيت كلمة المرور؟</a></div>
                        <label style="display:flex;align-items:center;gap:6px;color:#b0c4d9;font-size:13px;cursor:pointer;">
                            <input type="checkbox" v-model="rememberMe" style="accent-color:#c9a243;width:16px;height:16px;cursor:pointer;">
                            تذكرني
                        </label>
                    </div>
                    <button class="login-btn" :class="{ loading: isLoading }" @click="handleLogin" :disabled="isLoading">
                        <span v-if="!isLoading">دخول</span>
                        <span v-else class="loading-dots"><span></span><span></span><span></span></span>
                    </button>
                    <button class="guest-btn" @click="handleGuest">
                        <span class="material-symbols-outlined guest-btn-icon">person</span>
                        <span class="guest-btn-text">متابعة كضيف</span>
                    </button>
                    <div class="guest-divider">
                        <div class="guest-divider-line"></div>
                    </div>
                </template>

                <!-- ======= USER REGISTER VIEW ======= -->
                <template v-if="view === 'user-register'">
                    <div class="register-section">
                        <div class="reg-header"><span class="material-symbols-outlined reg-back" @click="view='login'">arrow_forward</span><span>إنشاء حساب مستخدم</span></div>
                        <input type="text" class="reg-input" placeholder="الاسم الكامل" v-model="regFullName">
                        <select class="reg-input" v-model="regGovernorate"><option value="" disabled>المحافظة</option><option v-for="g in governorates" :value="g">{{ g }}</option></select>
                        <input type="text" class="reg-input" placeholder="العنوان" v-model="regAddress">
                        <input type="tel" class="reg-input" placeholder="رقم الهاتف" v-model="regPhone">
                        <div class="reg-pwd-wrap">
                            <input :type="regShowPwd ? 'text' : 'password'" class="reg-input" placeholder="كلمة المرور" v-model="regPassword">
                            <span class="reg-pwd-toggle" @click="regShowPwd = !regShowPwd"><span class="material-symbols-outlined">{{ regShowPwd ? 'visibility' : 'visibility_off' }}</span></span>
                        </div>
                        <div class="reg-pwd-wrap">
                            <input :type="regShowConfirmPwd ? 'text' : 'password'" class="reg-input" placeholder="تأكيد كلمة المرور" v-model="regConfirmPassword">
                            <span class="reg-pwd-toggle" @click="regShowConfirmPwd = !regShowConfirmPwd"><span class="material-symbols-outlined">{{ regShowConfirmPwd ? 'visibility' : 'visibility_off' }}</span></span>
                        </div>
                        <button class="reg-submit" @click="submitRegistration('user')">إنشاء الحساب <span class="material-symbols-outlined" style="font-size:18px;">arrow_back</span></button>
                    </div>
                </template>

                <!-- ======= COMPANY REGISTER VIEW ======= -->
                <template v-if="view === 'company-register'">
                    <div class="register-section">
                        <div class="reg-header"><span class="material-symbols-outlined reg-back" @click="view='login'">arrow_forward</span><span>تسجيل شركة</span></div>
                        <input type="text" class="reg-input" placeholder="الاسم الكامل (صاحب الشركة)" v-model="regFullName">
                        <input type="text" class="reg-input" placeholder="اسم الشركة" v-model="regCompanyName">
                        <select class="reg-input" v-model="regGovernorate"><option value="" disabled>المحافظة</option><option v-for="g in governorates" :value="g">{{ g }}</option></select>
                        <input type="text" class="reg-input" placeholder="العنوان" v-model="regAddress">
                        <input type="tel" class="reg-input" placeholder="رقم الهاتف" v-model="regPhone">
                        <div class="reg-pwd-wrap">
                            <input :type="regShowPwd ? 'text' : 'password'" class="reg-input" placeholder="كلمة المرور" v-model="regPassword">
                            <span class="reg-pwd-toggle" @click="regShowPwd = !regShowPwd"><span class="material-symbols-outlined">{{ regShowPwd ? 'visibility' : 'visibility_off' }}</span></span>
                        </div>
                        <button class="reg-submit" @click="submitRegistration('company')">تسجيل الشركة <span class="material-symbols-outlined" style="font-size:18px;">arrow_back</span></button>
                    </div>
                </template>

                <!-- ======= OTP VERIFY VIEW ======= -->
                <template v-if="view === 'otp-verify'">
                    <div class="register-section">
                        <div style="text-align:center;margin-bottom:4px;">
                            <span class="material-symbols-outlined" style="font-size:48px;color:#c9a243;">mail_lock</span>
                        </div>
                        <div style="text-align:center;font-size:16px;font-weight:700;color:#fff;">تأكيد الحساب</div>
                        <div style="text-align:center;font-size:13px;color:#b0c4d9;margin-bottom:4px;">أدخل رمز التحقق المرسل إلى {{ pendingPhone }}</div>
                        <div v-if="otpError" style="text-align:center;color:#ff6b6b;font-size:12px;margin-bottom:4px;">{{ otpError }}</div>
                        <input type="text" class="reg-input reg-otp-input" placeholder="______" maxlength="6" v-model="otpCode" @keyup.enter="verifyOtp">
                        <div style="text-align:center;font-size:11px;color:#8a9bb0;margin-bottom:8px;">رمز التحقق هو 123456</div>
                        <button class="reg-submit" @click="verifyOtp">تأكيد <span class="material-symbols-outlined" style="font-size:18px;">arrow_back</span></button>
                        <div style="text-align:center;font-size:12px;color:#b0c4d9;cursor:pointer;margin-top:6px;" @click="view='login'">الرجوع</div>
                    </div>
                </template>

            </div>

            <!-- Register Buttons Separate Container -->
            <div v-if="view === 'login'" class="reg-buttons-row animate-in animate-delay-3">
                <button class="register-btn" @click="openUserRegister">إنشاء حساب مستخدم</button>
                <button class="register-btn register-btn-company" @click="openCompanyRegister">تسجيل شركة</button>
            </div>

                <template v-if="forgotStep === 'otp'">
                    <div class="modal-title" style="display:flex;align-items:center;gap:8px;">
                        <span class="material-symbols-outlined" style="font-size:22px;cursor:pointer;" @click="forgotStep='phone';forgotError='';">arrow_forward</span>
                        <span>تأكيد الرمز</span>
                    </div>
                    <div style="text-align:center;margin-bottom:4px;">
                        <span class="material-symbols-outlined" style="font-size:36px;color:#c9a243;">mail_lock</span>
                    </div>
                    <div style="color:var(--text-muted);font-size:12px;text-align:center;margin-bottom:4px;">أدخل رمز التحقق المرسل إلى {{ resetPhone }}</div>
                    <input type="text" class="modal-input" style="text-align:center;font-size:20px;letter-spacing:6px;font-weight:700;" placeholder="______" maxlength="6" v-model="resetOtp" @keyup.enter="handleResetOtp">
                    <div style="color:#8a9bb0;font-size:11px;text-align:center;margin-bottom:4px;">رمز التحقق هو 123456</div>
                    <div v-if="forgotError" style="color:#ff6b6b;font-size:12px;text-align:center;margin-bottom:8px;">{{ forgotError }}</div>
                    <button class="modal-btn" @click="handleResetOtp">تأكيد</button>
                </template>

                <!-- Step 3: New Password -->
                <template v-if="forgotStep === 'reset'">
                    <div class="modal-title" style="display:flex;align-items:center;gap:8px;">
                        <span class="material-symbols-outlined" style="font-size:22px;cursor:pointer;" @click="forgotStep='otp';forgotError='';">arrow_forward</span>
                        <span>كلمة مرور جديدة</span>
                    </div>
                    <div style="color:var(--text-muted);font-size:12px;text-align:center;margin-bottom:12px;">أدخل كلمة المرور الجديدة</div>
                    <div style="position:relative;margin-bottom:8px;">
                        <input :type="resetShowPwd ? 'text' : 'password'" class="modal-input" placeholder="كلمة المرور الجديدة" v-model="resetNewPassword" style="padding-left:40px;">
                        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#fff;cursor:pointer;" @click="resetShowPwd = !resetShowPwd"><span class="material-symbols-outlined" style="font-size:20px;">{{ resetShowPwd ? 'visibility' : 'visibility_off' }}</span></span>
                    </div>
                    <div style="position:relative;margin-bottom:8px;">
                        <input :type="resetShowConfirmPwd ? 'text' : 'password'" class="modal-input" placeholder="تأكيد كلمة المرور" v-model="resetConfirmPassword" style="padding-left:40px;" @keyup.enter="handleResetSave">
                        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#fff;cursor:pointer;" @click="resetShowConfirmPwd = !resetShowConfirmPwd"><span class="material-symbols-outlined" style="font-size:20px;">{{ resetShowConfirmPwd ? 'visibility' : 'visibility_off' }}</span></span>
                    </div>
                    <div v-if="forgotError" style="color:#ff6b6b;font-size:12px;text-align:center;margin-bottom:8px;">{{ forgotError }}</div>
                    <button class="modal-btn" @click="handleResetSave">حفظ</button>
                </template>

            </div>
        </div>
    </div>

    <script>
        // Hide splash screen + auto-redirect if Remember Me
        window.addEventListener('load', () => {
            var _auth = localStorage.getItem('bunean-user-auth');
            var _rem = localStorage.getItem('bunean-remember-me');
            if (_auth && _rem === 'true') {
                setTimeout(function() { window.location.replace('home.html'); }, 2000);
            } else {
                setTimeout(function() {
                    document.getElementById('splash').classList.add('hidden');
                    setTimeout(function() { document.getElementById('splash').remove(); }, 500);
                }, 2000);
            }
        });

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('SW registered'))
                .catch(err => console.log('SW registration failed'));
        }

        const { createApp, ref, onMounted } = Vue;

        // Inline showBrandAlert since nav.js is not loaded here
        function showBrandAlert(m) {
            var o=document.querySelector('.brand-alert-overlay');if(o)o.remove();
            var l=document.createElement('div');l.className='brand-alert-overlay';l.setAttribute('onclick','this.remove()');
            var d=document.createElement('div');d.className='brand-alert-modal';d.setAttribute('onclick','event.stopPropagation()');
            var i=document.createElement('div');i.className='brand-alert-icon-wrap';i.innerHTML='<span class="material-symbols-outlined brand-alert-icon">info</span>';
            var t=document.createElement('p');t.className='brand-alert-text';t.textContent=m;
            var b=document.createElement('button');b.className='brand-alert-btn';b.textContent='حسناً';b.setAttribute('onclick','this.closest(\'.brand-alert-overlay\').remove()');
            d.appendChild(i);d.appendChild(t);d.appendChild(b);l.appendChild(d);document.body.appendChild(l);
        }

        createApp({
            setup() {
                onMounted(function() { document.documentElement.classList.remove('app-loading'); });
                // Login
                const username = ref('');
                const password = ref('');
                const showPassword = ref(false);
                const isLoading = ref(false);
                const errorMsg = ref('');
                const successMsg = ref('');
                const showForgotModal = ref(false);
                const forgotStep = ref('phone');
                const resetPhone = ref('');
                const resetOtp = ref('');
                const resetNewPassword = ref('');
                const resetConfirmPassword = ref('');
                const resetShowPwd = ref(false);
                const resetShowConfirmPwd = ref(false);
                const forgotError = ref('');
                const resetUserId = ref('');
                const usernameInput = ref(null);
                const passwordInput = ref(null);

                // View: login | user-register | company-register | otp-verify
                const view = ref('login');

                // Remember Me
                const rememberMe = ref(false);

                // OTP
                const otpCode = ref('');
                const pendingPhone = ref('');
                const pendingRegData = ref(null);
                const otpError = ref('');

                // Registration
                const regFullName = ref('');
                const regCompanyName = ref('');
                const regGovernorate = ref('');
                const regAddress = ref('');
                const regPhone = ref('');
                const regPassword = ref('');
                const regConfirmPassword = ref('');
                const regShowPwd = ref(false);
                const regShowConfirmPwd = ref(false);
                const regLoading = ref(false);



                const focusPassword = () => {
                    passwordInput.value?.focus();
                };

                const handleLogin = async () => {
                    errorMsg.value = '';
                    successMsg.value = '';

                    if (!username.value.trim()) {
                        errorMsg.value = 'يرجى إدخال اسم المستخدم';
                        return;
                    }
                    if (!password.value.trim()) {
                        errorMsg.value = 'يرجى إدخال كلمة المرور';
                        return;
                    }

                    isLoading.value = true;

                    setTimeout(() => {
                        var uname = username.value.trim();
                        var pwd = password.value.trim();
                        var accounts = JSON.parse(localStorage.getItem('bunean-accounts') || '{}');
                        var acct = null;

                        if (uname === 'admin1' && pwd === '123456') {
                            acct = { role: 'company', name: 'عراق تكنو', ownerName: 'صاحب الشركة' };
                        } else if (uname === 'admin' && pwd === '123456') {
                            acct = { role: 'user', name: 'عراق تكنو' };
                        } else {
                            acct = accounts[uname];
                            if (acct && acct.password !== pwd) acct = null;
                        }

                        if (acct) {
                            successMsg.value = 'تم تسجيل الدخول بنجاح!';
                            localStorage.setItem('bunean-remember-me', rememberMe.value ? 'true' : 'false');
                            setTimeout(() => {
                                var userData = { name: acct.name, phone: acct.phone || '', governorate: acct.governorate || '', address: acct.address || '', role: acct.role || 'user' };
                                if (acct.ownerName) userData.ownerName = acct.ownerName;
                                localStorage.setItem('bunean-user-data', JSON.stringify(userData));
                                localStorage.setItem('bunean-user-auth', uname);
                                if (acct.role === 'company') {
                                    var saved = JSON.parse(localStorage.getItem('bunean-company-profile'));
                                    if (saved) {
                                        localStorage.setItem('bunean-company-auth', JSON.stringify({ name: saved.name, status: saved.status }));
                                    } else {
                                        localStorage.setItem('bunean-company-auth', JSON.stringify({ name: acct.name || 'عراق تكنو', status: 'قيد المراجعة' }));
                                    }
                                }
                                window.location.replace('home.html');
                            }, 800);
                        } else {
                            errorMsg.value = 'اسم المستخدم أو كلمة المرور غير صحيحة';
                        }
                        isLoading.value = false;
                    }, 1500);
                };

                const handleGuest = () => {
                    localStorage.setItem('bunean-user', 'ضيف عراق تكنو');
                    window.location.replace('home.html');
                };

                const openUserRegister = () => {
                    resetRegForm();
                    view.value = 'user-register';
                };

                const openCompanyRegister = () => {
                    resetRegForm();
                    view.value = 'company-register';
                };

                const resetRegForm = () => {
                    regFullName.value = '';
                    regCompanyName.value = '';
                    regGovernorate.value = '';
                    regAddress.value = '';
                    regPhone.value = '';
                    regPassword.value = '';
                    regConfirmPassword.value = '';
                    regShowPwd.value = false;
                    regShowConfirmPwd.value = false;
                };

                const submitRegistration = (type) => {
                    if (!regFullName.value.trim()) { showBrandAlert('أدخل الاسم الكامل'); return; }
                    if (type === 'company' && !regCompanyName.value.trim()) { showBrandAlert('أدخل اسم الشركة'); return; }
                    if (!regGovernorate.value) { showBrandAlert('اختر المحافظة'); return; }
                    if (!regAddress.value.trim()) { showBrandAlert('أدخل العنوان'); return; }
                    if (!regPhone.value.trim()) { showBrandAlert('أدخل رقم الهاتف'); return; }
                    if (!regPassword.value.trim()) { showBrandAlert('أدخل كلمة المرور'); return; }
                    if (type === 'user' && !regConfirmPassword.value.trim()) { showBrandAlert('أدخل تأكيد كلمة المرور'); return; }
                    if (type === 'user' && regPassword.value.trim() !== regConfirmPassword.value.trim()) { showBrandAlert('كلمة المرور غير متطابقة'); return; }

                    var accounts = JSON.parse(localStorage.getItem('bunean-accounts') || '{}');
                    var uid = regPhone.value.trim();
                    if (accounts[uid]) { showBrandAlert('رقم الهاتف مسجل مسبقاً'); return; }
                    var entry = {
                        password: regPassword.value.trim(),
                        role: type,
                        name: type === 'company' ? regCompanyName.value.trim() : regFullName.value.trim(),
                        phone: regPhone.value.trim(),
                        governorate: regGovernorate.value,
                        address: regAddress.value.trim()
                    };
                    accounts[uid] = entry;
                    localStorage.setItem('bunean-accounts', JSON.stringify(accounts));

                    // Store pending data for OTP verification
                    pendingPhone.value = regPhone.value.trim();
                    pendingRegData.value = {
                        type: type,
                        uid: uid,
                        ownerName: type === 'company' ? regFullName.value.trim() : '',
                        name: type === 'company' ? regCompanyName.value.trim() : regFullName.value.trim(),
                        phone: regPhone.value.trim(),
                        governorate: regGovernorate.value,
                        address: regAddress.value.trim()
                    };

                    // Show OTP verification
                    otpCode.value = '';
                    otpError.value = '';
                    view.value = 'otp-verify';
                };

                const verifyOtp = () => {
                    otpError.value = '';
                    if (otpCode.value !== '123456') {
                        otpError.value = 'رمز التحقق غير صحيح';
                        return;
                    }
                    var pd = pendingRegData.value;
                    if (!pd) { showBrandAlert('خطأ في بيانات التسجيل'); return; }

                    var userData = {
                        name: pd.name,
                        phone: pd.phone,
                        governorate: pd.governorate,
                        address: pd.address,
                        role: pd.type
                    };
                    if (pd.type === 'company' && pd.ownerName) userData.ownerName = pd.ownerName;
                    localStorage.setItem('bunean-user-data', JSON.stringify(userData));
                    localStorage.setItem('bunean-user-auth', pd.uid);

                    window.location.replace('home.html');
                };

                const closeForgot = () => {
                    showForgotModal.value = false;
                    forgotStep.value = 'phone';
                    resetPhone.value = '';
                    resetOtp.value = '';
                    resetNewPassword.value = '';
                    resetConfirmPassword.value = '';
                    forgotError.value = '';
                    resetUserId.value = '';
                };

                const handleResetPhone = () => {
                    forgotError.value = '';
                    var phone = resetPhone.value.trim();
                    if (!phone) { forgotError.value = 'أدخل رقم الهاتف'; return; }
                    resetUserId.value = phone;
                    forgotStep.value = 'otp';
                };

                const handleResetOtp = () => {
                    forgotError.value = '';
                    if (resetOtp.value !== '123456') {
                        forgotError.value = 'رمز التحقق غير صحيح';
                        return;
                    }
                    forgotStep.value = 'reset';
                };

                const handleResetSave = () => {
                    forgotError.value = '';
                    var pwd = resetNewPassword.value.trim() || '123456';
                    var uid = resetUserId.value;
                    var accounts = JSON.parse(localStorage.getItem('bunean-accounts') || '{}');
                    if (accounts[uid]) {
                        accounts[uid].password = pwd;
                        localStorage.setItem('bunean-accounts', JSON.stringify(accounts));
                    }
                    showBrandAlert('✅ تم تغيير كلمة المرور بنجاح');
                    closeForgot();
                };

                const governorates = ['بغداد','البصرة','نينوى','أربيل','السليمانية','كركوك','الأنبار','بابل','ذي قار','القادسية','واسط','المثنى','ميسان','دهوك','صلاح الدين','ديالى','كربلاء','النجف'];

                return {
                    username, password, showPassword, isLoading,
                    errorMsg, successMsg,
                    showForgotModal,
                    forgotStep, resetPhone, resetOtp, resetNewPassword, resetConfirmPassword,
                    resetShowPwd, resetShowConfirmPwd, forgotError,
                    handleResetPhone, handleResetOtp, handleResetSave, closeForgot,
                    usernameInput, passwordInput,
                    focusPassword,
                    handleLogin, handleGuest,
                    view, openUserRegister, openCompanyRegister,
                    regFullName, regCompanyName, regGovernorate, regAddress, regPhone, regPassword, regConfirmPassword,
                    regShowPwd, regShowConfirmPwd, regLoading, submitRegistration,
                    governorates,
                    rememberMe, otpCode, otpError, pendingPhone, verifyOtp
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
